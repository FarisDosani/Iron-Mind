<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iron Mind</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <style>
      /* Reset and Basic Styling */
      body {
        margin: 0;
        font-family: "Roboto", sans-serif;
        background-color: #f9f4ef;
        color: #4a3f36;
      }

      /* Navigation Bar */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #5b3c2b;
        padding: 15px 30px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      nav .logo-container {
        display: flex;
        align-items: center;
        text-decoration: none;
      }

      nav .logo-container img {
        height: 40px;
        margin-right: 10px;
      }

      nav .logo-container .logo-text {
        color: #d19a66;
        font-family: "Poppins", sans-serif;
        font-size: 1.5rem;
        font-weight: bold;
      }

      nav ul {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      nav ul li {
        margin: 0 15px;
      }

      nav ul li a {
        color: #f3e0ce;
        text-decoration: none;
        font-size: 1.1rem;
        font-family: "Poppins", sans-serif;
        transition: color 0.3s;
      }

      nav ul li a:hover {
        color: #d19a66;
      }

      /* Hero Section */
      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 60px;
        background: linear-gradient(
            rgba(43, 27, 21, 0.5),
            rgba(43, 27, 21, 0.5)
          ),
          url('runningnew.jpg') no-repeat center/cover;
        color: #f9f4ef;
        text-align: left;
        height: 100vh;
      }

      .hero .content {
        max-width: 600px;
      }

      .hero h1 {
        font-size: 4rem;
        margin-bottom: 20px;
        font-family: "Poppins", sans-serif;
      }

      .hero p {
        font-size: 1.5rem;
        margin-bottom: 30px;
        font-family: "Roboto", sans-serif;
      }

      .hero a {
        display: inline-block;
        background-color: #d19a66;
        color: #5b3c2b;
        padding: 15px 30px;
        border-radius: 5px;
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: bold;
        font-family: "Poppins", sans-serif;
        transition: background-color 0.3s;
      }

      .hero a:hover {
        background-color: #b58054;
      }

      /* Footer Section */
      footer {
        background-color: #5b3c2b;
        color: #f3e0ce;
        text-align: center;
        padding: 20px 0;
        margin-top: 40px;
        font-family: "Poppins", sans-serif;
      }

      footer p {
        margin: 0;
        font-size: 1rem;
      }

      /* Contact Us Section */
      .contact-us {
        background-color: #fffaf5;
        padding: 40px;
        margin: 40px auto;
        max-width: 800px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
      }

      .contact-us h2 {
        font-family: "Poppins", sans-serif;
        font-size: 2rem;
        margin-bottom: 20px;
        color: #4a3f36;
      }

      .contact-us form label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .contact-us form input,
      .contact-us form textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-family: "Roboto", sans-serif;
      }

      .contact-us form button {
        background-color: #d19a66;
        color: #5b3c2b;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .contact-us form button:hover {
        background-color: #b58054;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav>
      <a href="#" class="logo-container">
        <img src="logo.png" alt="Iron Mind Logo" />
        <span class="logo-text">Iron Mind</span>
      </a>
      <ul>
        <li><a href="shoulders.html">Shoulders</a></li>
        <li><a href="arms.html">Arms</a></li>
        <li><a href="legs.html">Legs</a></li>
        <li><a href="chest.html">Chest</a></li>
        <li><a href="abs.html">Abs</a></li>
      </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
      <div class="content">
        <h1>Fit. Fast. Forever.</h1>
        <p>Transform your body and mind with targeted workout plans and expert guidance.</p>
        <a href="bmi-calculator.html">Calculate BMI to Start Your Journey</a>
      </div>
    </section>

    <!-- Contact Us Section -->
    <section class="contact-us">
      <h2>Contact Us</h2>
      <form action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>

    <!-- Footer -->
    <footer>
      <p>&copy; 2024 Iron Mind. All rights reserved.</p>
    </footer>
  </body>
</html>
